<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projets Photos - Nicolas Didier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: var(--background-dark);
            color: var(--text-light);
        }

        .navbar {
            background: rgba(15, 23, 42, 0.85);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .navbar .nav-logo a,
        .navbar .nav-links a {
            color: var(--text-light);
        }

        .navbar .nav-links a:hover,
        .navbar .nav-links a.active {
            color: var(--primary);
        }

        .photos-container {
            padding: 2rem;
            min-height: calc(100vh - var(--nav-height));
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 3rem;
            padding-top: 1rem;
        }

        .filter-btn {
            background: transparent;
            color: #a0aec0;
            border: 1px solid #4a5568;
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: white;
        }

        .filter-btn.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 4px 15px rgba(0, 122, 194, 0.4);
        }

        /* --- MASONRY GRID --- */
        .masonry-grid {
            column-count: 4;
            column-gap: 16px;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 1200px) {
            .masonry-grid {
                column-count: 3;
            }
        }

        @media (max-width: 800px) {
            .masonry-grid {
                column-count: 2;
            }
        }

        @media (max-width: 500px) {
            .masonry-grid {
                column-count: 1;
            }
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 16px;
            border-radius: 8px;
            overflow: hidden;
            background: #1e293b;
            cursor: zoom-in;
            position: relative;
            transform: translateZ(0);
            /* Hardware accel */
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
        }

        .masonry-item:hover {
            transform: scale(1.02);
            filter: brightness(1.15);
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* --- LIGHTBOX MODAL --- */
        .lightbox {
            display: none;
            /* Hidden by default */
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(5px);
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
            z-index: 10000;
        }

        .lightbox-content {
            max-width: 90%;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 4px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        .lightbox-details {
            margin-top: 20px;
            text-align: center;
            color: white;
        }

        .lightbox-details h3 {
            margin-bottom: 5px;
            color: var(--primary);
        }

        .lightbox-details p {
            margin: 5px 0;
            font-size: 0.9rem;
            color: #cbd5e1;
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-container container">
            <div class="nav-logo">
                <a href="../index.html">N. Didier</a>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html" data-i18n="nav.home">Page d'accueil</a></li>
                <li><a href="photos.html" data-i18n="nav.photos" class="active">Projets photos</a></li>
                <li><a href="animation.html" data-i18n="nav.animation">Animation</a></li>
                <li><a href="parcours.html" data-i18n="nav.parcours">Parcours</a></li>
                <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>
            </ul>
            <button class="lang-btn" id="lang-btn" onclick="toggleLanguage()">FR</button>
        </div>
    </nav>

    <main class="photos-container fade-in">
        <div class="filters" id="filters-container">
            <!-- Buttons generated by JS -->
            <button class="filter-btn active" data-filter="All" data-i18n="photos.filters.all">Tout</button>
            <button class="filter-btn" data-filter="Nature" data-i18n="photos.filters.nature">Nature</button>
            <button class="filter-btn" data-filter="Urbain" data-i18n="photos.filters.urbain">Urbain</button>
            <button class="filter-btn" data-filter="Portrait" data-i18n="photos.filters.portrait">Portrait</button>
            <button class="filter-btn" data-filter="Paysage" data-i18n="photos.filters.paysage">Paysage</button>
            <button class="filter-btn" data-filter="Divers" data-i18n="photos.filters.divers">Divers</button>
        </div>

        <div class="masonry-grid" id="masonry-grid">
            <!-- Photos will be injected here via JS -->
            <div style="text-align: center; width: 100%; color: #94a3b8;">Chargement des photos...</div>
        </div>

        <!-- Lightbox -->
        <div id="lightbox" class="lightbox">
            <span class="lightbox-close" onclick="closeLightbox()">&times;</span>
            <img class="lightbox-content" id="lightbox-img">
            <div class="lightbox-details" id="lightbox-details">
                <h3 id="lb-title"></h3>
                <p id="lb-desc"></p>
                <p id="lb-meta"></p>
            </div>
        </div>
    </main>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="js/lang.js" defer></script>
    <script src="js/firebase-config.js" defer></script>
    <script src="js/photos.js" defer></script>
</body>

</html>
