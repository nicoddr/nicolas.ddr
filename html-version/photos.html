<head>

    <style>
        .photos-container {
            padding: 2rem;
            min-height: calc(100vh - var(--nav-height));
        }

        .filters {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            justify-content: center;
            margin-bottom: 3rem;
            padding-top: 1rem;
        }

        .filter-btn {
            background: var(--bg-surface);
            color: var(--text-muted);
            border: 1px solid var(--border-subtle);
            padding: 8px 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.88rem;
            font-weight: 500;
            font-family: var(--font-family);
            position: relative;
            overflow: hidden;
        }

        .filter-btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            background: rgba(var(--primary-rgb), 0.06);
        }

        .filter-btn.active {
            background: var(--gradient-glow);
            color: #fff;
            border-color: rgba(var(--primary-rgb), 0.4);
            box-shadow: var(--shadow-glow-strong);
        }

        /* Photo count badge */
        .filter-count {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 18px;
            height: 18px;
            font-size: 0.7rem;
            font-weight: 700;
            background: rgba(var(--primary-rgb), 0.15);
            color: var(--primary);
            border-radius: 9px;
            margin-left: 6px;
            padding: 0 5px;
        }

        .filter-btn.active .filter-count {
            background: rgba(255,255,255,0.2);
            color: #fff;
        }

        /* --- MASONRY GRID --- */
        .masonry-grid {
            column-count: 4;
            column-gap: 14px;
            max-width: 1600px;
            margin: 0 auto;
        }

        @media (max-width: 1200px) {
            .masonry-grid { column-count: 3; }
        }

        @media (max-width: 800px) {
            .masonry-grid { column-count: 2; }
        }

        @media (max-width: 500px) {
            .masonry-grid { column-count: 1; }
        }

        .masonry-item {
            break-inside: avoid;
            margin-bottom: 14px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.02);
            cursor: zoom-in;
            position: relative;
            transform: translateZ(0);
            transition: transform 0.3s ease, box-shadow 0.3s ease, opacity 0.4s ease;
            animation: photoFadeIn 0.5s var(--ease-out) both;
        }

        @keyframes photoFadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .masonry-item img {
            width: 100%;
            height: auto;
            display: block;
            transition: transform 0.4s var(--ease-out), filter 0.4s ease;
        }

        .masonry-item:hover {
            z-index: 10;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .masonry-item:hover img {
            transform: scale(1.04);
            filter: brightness(1.1);
        }

        /* Photo overlay */
        .photo-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
        }

        .masonry-item:hover .photo-overlay {
            opacity: 1;
        }

        .photo-overlay h4 {
            font-size: 0.85rem;
            color: #fff;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .photo-overlay span {
            font-size: 0.75rem;
            color: rgba(255,255,255,0.7);
        }

        /* --- SKELETON LOADING --- */
        .skeleton-item {
            break-inside: avoid;
            margin-bottom: 14px;
            border-radius: 12px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.03);
            animation: skeletonPulse 1.5s ease-in-out infinite;
        }

        .skeleton-item .skeleton-inner {
            width: 100%;
            background: linear-gradient(90deg, rgba(255,255,255,0.02) 0%, rgba(255,255,255,0.06) 50%, rgba(255,255,255,0.02) 100%);
            background-size: 200% 100%;
            animation: skeletonShimmer 1.5s ease-in-out infinite;
        }

        @keyframes skeletonPulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }

        @keyframes skeletonShimmer {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        .lightbox-details p {
            margin: 5px 0;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
    </style>
</head>

    <!-- Lightbox moved to body level to fix fixed positioning -->

        <span class="lightbox-close" id="lb-close">&times;</span>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="js/lang.js" defer></script>
    <script src="js/firebase-config.js" defer></script>
    <script src="js/photos.js" defer></script>
    <script>
        // === ENHANCED LIGHTBOX ===
        (function() {
            let currentPhotos = [];
            let currentIndex = 0;

            // Store references globally for photos.js to use
            window.lightboxPhotos = currentPhotos;
            window.lightboxIndex = 0;

            const lightbox = document.getElementById('lightbox');
            const lbImg = document.getElementById('lightbox-img');
            const lbTitle = document.getElementById('lb-title');
            const lbDesc = document.getElementById('lb-desc');
            const lbMeta = document.getElementById('lb-meta');
            const lbCounter = document.getElementById('lb-counter');
            const lbClose = document.getElementById('lb-close');
            const lbPrev = document.getElementById('lb-prev');
            const lbNext = document.getElementById('lb-next');

            window.openLightbox = function(index) {
                currentIndex = index;
                currentPhotos = window.lightboxPhotos || [];
                showPhoto();
                lightbox.classList.add('active');
                document.body.style.overflow = 'hidden';
            };

            window.closeLightbox = function() {
                lightbox.classList.remove('active');
                document.body.style.overflow = '';
            };

            function showPhoto() {
                if (!currentPhotos.length) return;
                const photo = currentPhotos[currentIndex];
                if (!photo) return;
                lbImg.src = photo.url;
                lbTitle.textContent = photo.title || '';
                lbDesc.textContent = photo.description || '';
                lbMeta.textContent = photo.category ? `📂 ${photo.category}` : '';
                lbCounter.textContent = `${currentIndex + 1} / ${currentPhotos.length}`;
            }

            function nextPhoto() {
                currentIndex = (currentIndex + 1) % currentPhotos.length;
                showPhoto();
            }

            function prevPhoto() {
                currentIndex = (currentIndex - 1 + currentPhotos.length) % currentPhotos.length;
                showPhoto();
            }

            lbClose.addEventListener('click', closeLightbox);
            lbNext.addEventListener('click', nextPhoto);
            lbPrev.addEventListener('click', prevPhoto);

            // Click outside to close
            lightbox.addEventListener('click', (e) => {
                if (e.target === lightbox) closeLightbox();
            });

            // Keyboard navigation
            document.addEventListener('keydown', (e) => {
                if (!lightbox.classList.contains('active')) return;
                if (e.key === 'Escape') closeLightbox();
                if (e.key === 'ArrowRight') nextPhoto();
                if (e.key === 'ArrowLeft') prevPhoto();
            });

            // Touch swipe
            let touchStartX = 0;
            lightbox.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
            }, { passive: true });

            lightbox.addEventListener('touchend', (e) => {
                const diff = e.changedTouches[0].screenX - touchStartX;
                if (Math.abs(diff) > 50) {
                    if (diff > 0) prevPhoto();
                    else nextPhoto();
                }
            }, { passive: true });
        })();

        // === HAMBURGER MENU ===
        document.addEventListener('DOMContentLoaded', () => {
            const hamburger = document.getElementById('hamburger');
            const mobileNav = document.getElementById('mobile-nav');
            if (hamburger && mobileNav) {
                hamburger.addEventListener('click', () => {
                    hamburger.classList.toggle('active');
                    mobileNav.classList.toggle('active');
                    document.body.style.overflow = mobileNav.classList.contains('active') ? 'hidden' : '';
                });
                mobileNav.querySelectorAll('a').forEach(link => {
                    link.addEventListener('click', () => {
                        hamburger.classList.remove('active');
                        mobileNav.classList.remove('active');
                        document.body.style.overflow = '';
                    });
                });
            }

            // Navbar scroll
            const navbar = document.getElementById('navbar');
            window.addEventListener('scroll', () => {
                navbar.classList.toggle('scrolled', window.scrollY > 50);
            });
        });
    </script>
