<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Nicolas Didier</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-page {
            padding: 4rem 2rem;
            display: flex;
            justify-content: center;
        }

        .admin-card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 800px;
        }

        .admin-card h1 {
            color: var(--primary);
            margin-bottom: 2rem;
        }

        .success-msg {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #c6f6d5;
            color: #2f855a;
            padding: 1rem 2rem;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            font-weight: 600;
            z-index: 10000;
            animation: slideInUp 0.3s ease-out forwards;
        }

        @keyframes slideInUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .admin-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .admin-form label {
            font-weight: 600;
            color: var(--text-dark);
            font-size: 0.95rem;
        }

        .admin-form input,
        .admin-form select,
        .admin-form textarea {
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .admin-form input:focus,
        .admin-form select:focus,
        .admin-form textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0, 122, 194, 0.1);
        }

        .filter-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: normal !important;
            cursor: pointer;
        }

        .submit-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.2s ease;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar">
        <div class="nav-container container">
            <div class="nav-logo">
                <a href="../index.html">N. Didier</a>
            </div>
            <ul class="nav-links">
                <li><a href="../index.html" data-i18n="nav.home">Page d'accueil</a></li>
                <li><a href="photos.html" data-i18n="nav.photos">Projets photos</a></li>
                <li><a href="animation.html" data-i18n="nav.animation">Animation</a></li>
                <li><a href="parcours.html" data-i18n="nav.parcours">Parcours</a></li>
                <li><a href="contact.html" data-i18n="nav.contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="admin-page container fade-in">
        <div class="admin-card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
                <div>
                    <h1 data-i18n="admin.title" style="margin-bottom: 0.5rem;">Tableau de bord Admin</h1>
                    <p>Ajouter une nouvelle photographie au portfolio.</p>
                </div>
                <a href="admin-manage.html" target="_blank"
                    style="padding: 10px 20px; background: var(--secondary); color: white; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 0.9rem;">Gérer
                    les photos ➔</a>
            </div>

            <form id="adminForm" class="admin-form">
                <div class="form-group">
                    <label>Image URL *</label>
                    <input type="url" id="url" required placeholder="https://...">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Titre</label>
                        <input type="text" id="title">
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="date">
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Lieu / Pays</label>
                        <input type="text" id="location" placeholder="Ex: France, Paris...">
                    </div>
                    <div class="form-group">
                        <label>Format d'image *</label>
                        <select id="aspectRatio" required>
                            <option value="16:9">16:9</option>
                            <option value="9:16">9:16</option>
                            <option value="4:3">4:3</option>
                            <option value="3:4">3:4</option>
                            <option value="1:1">1:1</option>
                            <option value="3:2">3:2</option>
                            <option value="2:3">2:3</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Filtres (Tags)</label>
                    <div class="filter-checkboxes">
                        <label class="checkbox-label"><input type="checkbox" value="Nature" class="filter-cb">
                            Nature</label>
                        <label class="checkbox-label"><input type="checkbox" value="Urbain" class="filter-cb">
                            Urbain</label>
                        <label class="checkbox-label"><input type="checkbox" value="Portrait" class="filter-cb">
                            Portrait</label>
                        <label class="checkbox-label"><input type="checkbox" value="Paysage" class="filter-cb">
                            Paysage</label>
                        <label class="checkbox-label"><input type="checkbox" value="Divers" class="filter-cb">
                            Divers</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Description</label>
                    <textarea id="description" rows="4"></textarea>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">Ajouter la Photo</button>
            </form>
        </div>
    </main>

    <!-- Pop-up Toast -->
    <div class="success-msg" id="successMsg">✔️ Photo uploadée avec succès !</div>

    <!-- Scripts -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <script src="js/lang.js" defer></script>
    <script src="js/firebase-config.js" defer></script>
    <script src="js/admin.js" defer></script>
</body>

</html>
